# Hybrid RAG 系统的数据服务。
# 启动命令：docker compose up -d
services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: rag-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    container_name: rag-neo4j
    ports:
      - "7474:7474"   # browser UI (http://localhost:7474)
      - "7687:7687"   # Bolt
    environment:
      # 重要：Neo4j 5.x 要求密码至少 8 位。
      # 若 "123456" 启动被拒，请把下方两个值
      # （以及 backend/.env 中的 NEO4J_PASSWORD）同时改为如 "12345678"。
      - NEO4J_AUTH=neo4j/123456
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
