# -*- coding: utf-8 -*-
# 后端本地开发编排：只启动 Qdrant + Neo4j，供本机 Python 后端调试。
# 启动：npm run dev:db 或 docker compose --env-file .env -f docker-compose.dev.yaml up -d

services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: rag-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.24
    container_name: rag-neo4j-dev
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_dev_data:/data
    restart: unless-stopped

volumes:
  qdrant_dev_data:
  neo4j_dev_data:
