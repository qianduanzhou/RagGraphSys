# -*- coding: utf-8 -*-
# 前端生产编排：部署机只需要准备 .env，然后执行：
#   docker compose --env-file .env -f docker-compose.yaml up -d
# Compose 会按 .env 中的 IMAGE_PUSH_ADDRESS / IMAGE_NAME / IMAGE_TAG 拉取已推送的镜像。

services:
  frontend:
    image: ${IMAGE_PUSH_ADDRESS}/${IMAGE_NAME}:${IMAGE_TAG}
    ports:
      - "${FRONTEND_PORT:-7847}:80"
    networks: [rag-net]
    restart: unless-stopped

networks:
  rag-net:
    name: rag-net



