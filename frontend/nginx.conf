# -*- coding: utf-8 -*-
# 前端 nginx 站点：托管 Vite 构建产物，并把 /api 反代到后端容器。
# "backend" 是后端 compose 里的服务名，经共享网络 rag-net 解析为后端容器。

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # 批量上传 PDF/Word/Excel，按需调大
    client_max_body_size 100m;

    # ---------- API 反代 ----------
    location /api/ {
        # 关键：用变量 + docker 内嵌 DNS(127.0.0.11) 做"运行时解析"。
        # 这样后端尚未启动时，nginx 仍能正常启动；后端就绪后自动连通，无需重启前端。
        # （若直接写 proxy_pass http://backend:8000，nginx 启动时就会解析，后端没起会启动失败。）
        resolver 127.0.0.11 valid=10s;
        set $backend http://backend:8000;
        proxy_pass $backend;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式对话（/api/chat/stream）：关闭缓冲、加大超时，
        # 否则字符增量会被 nginx 攒一批再发，表现为"卡顿/一次性吐出"。
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---------- SPA 路由回退 ----------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
